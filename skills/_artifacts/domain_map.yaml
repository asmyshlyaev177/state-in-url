skills:
  - name: 'Feature-scoped URL state hook'
    slug: 'feature-state-hook'
    domain: 'core-state'
    description: 'Define typed module-scoped state, wrap useUrlState in a per-feature custom hook, and share it across unrelated components. Covers drawer/tab/toggle/select interactions which all reduce to the same mechanic. Briefly mentions encodeState, useUrlStateBase, and the 12KB URL ceiling.'
    type: 'core'
    covers:
      - 'useUrlState (all framework variants)'
      - 'JSONCompatible state shape'
      - 'urlState / setState / setUrl / reset return values'
      - 'Functional updaters with (curr, initial) signature'
      - 'Cross-component state sharing via shared default-state object identity'
      - 'Multiple state objects on the same page'
      - 'Brief mention of useUrlStateBase (extension to other routers)'
      - 'Brief mention of encodeState/decodeState (non-React use)'
      - 'Brief mention of 12KB URL ceiling and unsupported value types'
    tasks:
      - 'Define a typed state shape for a feature (filters, drawer, tabs)'
      - 'Create a useFooState() hook that wraps useUrlState'
      - 'Open and close a drawer by writing/clearing fields'
      - 'Switch tabs via URL'
      - 'Toggle items in a multi-select array'
      - 'Reset feature state'
      - 'Use multiple independent state objects on the same page'
    failure_modes:
      - mistake: 'defaultState defined inside React component'
        mechanism: >
          The library uses object identity of the default-state argument to wire up subscriptions and SSR parsing.
          A new object on every render breaks sharing, breaks SSR hydration, and silently loses URL values on first render.
          Owner repeats this fix on issues #57, #60, #69.
        wrong_pattern: |
          function MyFeature({ initialTab }) {
            const defaults = { tab: initialTab, open: false };  // recreated each render
            const { urlState } = useUrlState(defaults);
          }
        correct_pattern: |
          const FEATURE_STATE = { tab: 'a', open: false } as const;
          function MyFeature() {
            const { urlState } = useUrlState(FEATURE_STATE);
          }
        source: 'GitHub issues #57, #60, #69 (maintainer replies)'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['feature-state-hook', 'input-handling', 'nextjs-ssr', 'react-router-remix-setup', 'form-library-integration']

      - mistake: 'Using interface instead of type for state shape'
        mechanism: >
          interface produces a TS error in the generic constraint JSONCompatible<T>. type works because TS treats
          interfaces and type-aliased objects differently in mapped-type constraints. Confirmed on issue #21.
        wrong_pattern: |
          interface FeatureState { tab: string; open: boolean }
          const initial: FeatureState = { tab: 'a', open: false };
          useUrlState(initial); // TS error
        correct_pattern: |
          type FeatureState = { tab: string; open: boolean };
          const initial: FeatureState = { tab: 'a', open: false };
          useUrlState(initial); // OK
        source: 'GitHub issue #21'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Storing non-JSON-serializable values'
        mechanism: >
          Functions, BigInt, Symbol, Map, Set, ArrayBuffer, class instances are not serializable. Dates ARE supported
          (custom encoding). Confirmed by utils.ts JSONCompatible type and Simple union.
        wrong_pattern: |
          const state = { onChange: () => {}, items: new Set([1,2]) };
        correct_pattern: |
          const state = { items: [1, 2], updatedAt: new Date() }; // arrays, dates OK
        source: 'packages/urlstate/utils.ts JSONCompatible type; README gotchas'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Mutating urlState directly'
        mechanism: >
          urlState is a reference to internal state; mutating it bypasses the subscriber system and the URL sync.
          Always use setState/setUrl with new objects.
        wrong_pattern: |
          urlState.tab = 'b';  // does nothing useful
        correct_pattern: |
          setUrl({ tab: 'b' });
        source: 'JSDoc on useUrlState return type'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Expecting full reset to clear default-valued fields from URL'
        mechanism: >
          The library only encodes fields whose value differs from the default. Resetting to defaults produces a
          clean URL (no query string), not field=defaultValue. Picking defaults that mean "absent" is essential.
        wrong_pattern: |
          // Wanting ?tab=details in URL when tab is at default
          const STATE = { tab: 'details' };  // becomes "no query string" when at default
        correct_pattern: |
          // Defaults should mean "no filter applied"
          const STATE = { tab: 'details' as 'details'|'qa'|'applicants' };
          // URL is clean when tab === 'details'; ?tab=qa appears only when different
        source: 'README "Best Practices" + Form.tsx demo'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'setUrl inside useEffect creating an infinite loop'
        mechanism: >
          urlState changes trigger effects; calling setUrl inside an effect that depends on urlState (or on a
          derived value) re-fires the effect indefinitely. The library does throttle URL writes, but it does not
          break a state→effect→setUrl→state cycle. Maintainer-confirmed Phase 4 pitfall.
        wrong_pattern: |
          React.useEffect(() => {
            setUrl({ tab: urlState.tab.toLowerCase() }); // urlState change re-triggers effect
          }, [urlState, setUrl]);
        correct_pattern: |
          // Derive on read, or guard with a content check
          const tab = urlState.tab.toLowerCase();
          // If you really must sync, gate it:
          React.useEffect(() => {
            if (urlState.tab !== urlState.tab.toLowerCase()) {
              setUrl({ tab: urlState.tab.toLowerCase() });
            }
          }, [urlState.tab, setUrl]);
        source: 'Maintainer interview (Phase 4)'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['feature-state-hook', 'input-handling']

      - mistake: 'Calling useUrlState directly in multiple components with separate default objects'
        mechanism: >
          Sharing is keyed by the default-state object identity. Three components each declaring their own
          `const DEFAULTS = { ... }` produce three independent stores even with identical shape — sharing
          silently fails. Maintainer-confirmed as the most important production-scale pitfall.
        wrong_pattern: |
          // ComponentA.tsx
          const DEFAULTS = { tab: 'a' };
          useUrlState(DEFAULTS);
          // ComponentB.tsx (separate file, different identity)
          const DEFAULTS = { tab: 'a' };
          useUrlState(DEFAULTS); // not sharing with A
        correct_pattern: |
          // hooks/useFeatureState.ts — single source
          export const FEATURE_STATE = { tab: 'a' };
          export const useFeatureState = () => useUrlState(FEATURE_STATE);
          // ComponentA + ComponentB both import { useFeatureState } from './useFeatureState';
        source: 'Maintainer interview (Phase 4) — highest-impact production hazard'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Calling setUrl or setState inside the render body'
        mechanism: >
          setUrl/setState trigger state updates; calling them outside an effect or handler runs during render,
          producing React's "Cannot update a component while rendering a different component" warning and
          potential render loops.
        wrong_pattern: |
          function Component() {
            const { urlState, setUrl } = useUrlState(FEATURE_STATE);
            if (!urlState.initialized) setUrl({ initialized: true }); // during render
            return <div>...</div>;
          }
        correct_pattern: |
          function Component() {
            const { urlState, setUrl } = useUrlState(FEATURE_STATE);
            React.useEffect(() => {
              if (!urlState.initialized) setUrl({ initialized: true });
            }, [urlState.initialized, setUrl]);
          }
        source: 'Maintainer interview (Phase 4)'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Namespace collision when two features use the same top-level field name'
        mechanism: >
          Each useUrlState writes/reads its own keys against the global query string. If two unrelated features
          both define `tab` in their default-state object on the same page, they overwrite each other.
        wrong_pattern: |
          const JOBS_STATE = { tab: 'details' };
          const SETTINGS_STATE = { tab: 'profile' };
          // both mounted on same page → fight over ?tab=
        correct_pattern: |
          const JOBS_STATE = { jobs_tab: 'details' };
          const SETTINGS_STATE = { settings_tab: 'profile' };
        source: 'Maintainer interview (Phase 4)'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Instant input + deferred URL sync'
    slug: 'input-handling'
    domain: 'input-handling'
    description: 'Pattern for text inputs, sliders, and other rapidly-changing controls: setState on change for instant local feedback, setUrl on blur or debounced timer to keep URL writes throttled.'
    type: 'core'
    covers:
      - 'setState vs setUrl decision'
      - 'onChange + onBlur idiom'
      - 'useEffect + setTimeout debounce idiom'
      - 'setUrl() with no args (flush current state)'
      - 'Throttling/race-condition awareness (last-write-wins via internal timer)'
    tasks:
      - 'Bind a text input to URL state without URL churn on every keystroke'
      - 'Debounce a search input syncing to URL'
      - 'Flush state to URL on form submit or input blur'
    failure_modes:
      - mistake: 'Binding setUrl directly to onChange of a fast-changing input'
        mechanism: >
          Every keystroke fires a URL update; the library throttles, but the agent and user perceive lag and
          extra re-renders. The library is intentionally async on URL writes — perceived lag is misdiagnosed
          as a bug (issue #78).
        wrong_pattern: |
          <input
            value={urlState.q}
            onChange={(e) => setUrl({ q: e.target.value })}
          />
        correct_pattern: |
          <input
            value={urlState.q}
            onChange={(e) => setState({ q: e.target.value })}
            onBlur={() => setUrl()}
          />
        source: 'GitHub issue #78; README "Update state only and sync to URL manually"'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Expecting setUrl to update the URL synchronously'
        mechanism: >
          setUrl updates internal state synchronously but defers the URL write through an internal timer (TIMEOUT
          constant) for "last-write-wins" coalescing. Reading window.location.search immediately after setUrl
          returns the old value.
        wrong_pattern: |
          setUrl({ tab: 'b' });
          console.log(window.location.search); // still old value
        correct_pattern: |
          setUrl({ tab: 'b' });
          // urlState already reflects 'b'; URL will catch up on next tick
        source: 'GitHub issue #78; useUrlStateBase.ts global timer'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Calling setUrl(urlState) without realizing it diffs by content'
        mechanism: >
          setUrl compares by deep content equality (utils.ts isEqual). Calling setUrl(urlState) is a safe no-op
          if nothing changed — useful for "flush" semantics. Agents may add unnecessary equality guards.
        wrong_pattern: |
          useEffect(() => {
            if (!shallowEqual(urlState, lastSyncedRef.current)) {  // unnecessary
              setUrl(urlState);
              lastSyncedRef.current = urlState;
            }
          }, [urlState]);
        correct_pattern: |
          useEffect(() => {
            const t = setTimeout(() => setUrl(urlState), 500);
            return () => clearTimeout(t);
          }, [urlState, setUrl]);
        source: 'packages/urlstate/utils.ts isEqual; README debounce recipe'
        priority: 'LOW'
        status: 'active'

  - name: 'SSR-safe URL state in Next.js App Router'
    slug: 'nextjs-ssr'
    domain: 'nextjs-integration'
    description: 'Forwarding searchParams from server pages, calling useSearchParams() from client components, hydration safety, useHistory option, and the middleware/proxy workaround for accessing query params in server layouts. Pages Router explicitly unsupported.'
    type: 'framework'
    covers:
      - 'Server page → forward searchParams to client component'
      - 'Client component → useSearchParams() forwarding'
      - 'searchParams as Promise in Next.js 15+'
      - 'useHistory option (default true) and when to flip to false'
      - 'Middleware setting searchParams header, layout reading via headers() + decodeState'
      - 'App Router only — Pages Router unsupported'
      - 'Reset of URL state on route change'
    tasks:
      - 'Wire useUrlState in a Next.js client component with no hydration warnings'
      - 'Read URL state inside a server layout via middleware header'
      - 'Decode state on the server for data fetching'
      - 'Decide useHistory: true vs false for an RSC-data-fetching feature'
    failure_modes:
      - mistake: 'Not passing searchParams in Next.js App Router'
        mechanism: >
          searchParams sets the **initial** state correctly on first render. Without it, the first render uses
          the default state (empty/falsy), then a client useEffect re-syncs from the URL on the next tick —
          causing a hydration mismatch warning and a visible flash of default state. URL state still survives
          refresh either way (the URL is the source of truth), but the initial paint is wrong. With a Proxy
          (formerly middleware) setup feeding the layout, there is no initial lag or extra rerender.
          Most common Next.js issue (#40, #60). Maintainer-clarified Phase 4.
        wrong_pattern: |
          // page.tsx is server, Form is client
          export default function Page() { return <Form />; }
          // inside Form
          const { urlState } = useUrlState(FORM_STATE);  // missing searchParams
        correct_pattern: |
          export default async function Page({ searchParams }) {
            const sp = await searchParams; // Next 15+: Promise
            return <Form searchParams={sp} />;
          }
          // Form is "use client"
          const { urlState } = useUrlState(FORM_STATE, { searchParams });
        source: 'GitHub issues #40, #60'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Awaiting searchParams forgotten in Next.js 15+'
        mechanism: >
          Next.js 15 changed page-level searchParams to a Promise. Passing the un-awaited Promise silently
          decodes to nothing on the server.
        wrong_pattern: |
          export default function Page({ searchParams }) {
            return <Form searchParams={searchParams} />; // unwrapped Promise
          }
        correct_pattern: |
          export default async function Page({ searchParams }) {
            const sp = await searchParams;
            return <Form searchParams={sp} />;
          }
        source: 'Next.js 15 migration notes'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using state-in-url with Next.js Pages Router'
        mechanism: >
          The /next subpath uses next/navigation hooks (useRouter, useSearchParams) which only exist in App
          Router. Pages Router is explicitly unsupported and there are no plans to support it (README gotcha #3).
        wrong_pattern: |
          // pages/index.tsx
          import { useUrlState } from 'state-in-url/next'; // breaks
        correct_pattern: |
          // Use App Router (app/ directory). No Pages Router support.
        source: 'README "Gotchas" section'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Setting useHistory: false unnecessarily, causing _rsc refetches per keystroke'
        mechanism: >
          Default useHistory: true uses window.history.pushState to update the URL without triggering Next.js
          server payload fetches. Flipping to false causes an _rsc round-trip per URL change (vercel/next.js#59167).
          Only flip when server-data must refetch on URL change.
        wrong_pattern: |
          useUrlState(STATE, { searchParams, useHistory: false }); // every keystroke = server request
        correct_pattern: |
          useUrlState(STATE, { searchParams }); // useHistory defaults to true
        source: 'JSDoc on useUrlState params; vercel/next.js#59167'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Trying to read searchParams in a server layout directly'
        mechanism: >
          Next.js App Router server layouts do not receive searchParams. The library workaround uses a Proxy
          (Next.js 16+ name; middleware.ts still works as a deprecated alias) to expose the query string as a
          header, then decodes inside the layout via headers() + decodeState. With this setup there is no
          initial lag and no extra rerenders. Maintainer-clarified Phase 4.
        wrong_pattern: |
          export default function Layout({ children, searchParams }) {} // searchParams is undefined
        correct_pattern: |
          // proxy.ts (or middleware.ts as deprecated alias)
          import type { NextRequest } from 'next/server';
          import { NextResponse } from 'next/server';
          export function proxy(req: NextRequest) {
            const sp = (req.url.includes('_next') ? '' : req.url).split('?')[1] || '';
            const headers = new Headers(req.headers);
            headers.set('searchParams', sp);
            return NextResponse.next({ request: { headers } });
          }
          // layout.tsx
          import { headers } from 'next/headers';
          import { decodeState } from 'state-in-url/encodeState';
          const sp = (await headers()).get('searchParams') ?? '';
          const initial = decodeState(sp, INITIAL_STATE);
        source: 'README "Using hook in layout component"; packages/example-nextjs16/src/middleware.ts; maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

