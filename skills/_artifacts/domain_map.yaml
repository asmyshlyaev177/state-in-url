    slug: 'react-router-remix-setup'
    domain: 'router-integration'
    description: 'Wiring useUrlState for react-router v6 (subpath /react-router6), v7 (/react-router), and remix v2 (/remix). API is identical to Next.js version; differences are import path and NavigateOptions (preventScrollReset etc.).'
    type: 'framework'
    covers:
      - 'Three import paths: /react-router, /react-router6, /remix'
      - 'NavigateOptions: preventScrollReset, replace, state'
      - 'basename support'
      - 'v6 separation from v7 (BREAKING change in v6.0.0)'
    tasks:
      - 'Set up useUrlState in a react-router v7 app'
      - 'Migrate an existing react-router v6 import after upgrading to state-in-url v6'
      - 'Set up useUrlState in a remix v2 loader-driven route'
      - 'Pass preventScrollReset to prevent layout jumps'
    failure_modes:
      - mistake: 'Importing /react-router for react-router v6'
        mechanism: >
          As of state-in-url v6.0.0 (Aug 2025), react-router v6 lives at the /react-router6 subpath. /react-router
          targets v7 only. Agents trained on older versions will use the wrong import.
        wrong_pattern: |
          // react-router v6 project
          import { useUrlState } from 'state-in-url/react-router'; // wrong since v6.0.0
        correct_pattern: |
          import { useUrlState } from 'state-in-url/react-router6';
        source: 'CHANGELOG v6.0.0 BREAKING CHANGES'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Using deprecated useUrlState({ allParamsObj }) call signature'
        mechanism: >
          state-in-url v5.0.0 removed the old object-wrapped call signature. Now defaults are passed directly.
          Agents trained on pre-v5 code will reproduce the deprecated shape.
        wrong_pattern: |
          useUrlState({ defaultState: FORM, replace: true }); // removed in v5
        correct_pattern: |
          useUrlState(FORM, { replace: true });
        source: 'CHANGELOG v5.0.0 BREAKING CHANGES'
        priority: 'HIGH'
        status: 'active'

  - name: 'Composition with form libraries'
    slug: 'form-library-integration'
    domain: 'form-composition'
    description: 'Pairing useUrlState with react-hook-form (or formik) to use the URL as the form draft store. Reference pattern from GitHub issue #57.'
    type: 'composition'
    covers:
      - 'Module-scoped default form values reused for both useForm and useUrlState'
      - 'react-hook-form subscribe() (preferred) or watch() to push form changes into setUrl'
      - 'Hydrating useForm defaultValues from urlState on mount'
    tasks:
      - 'Persist filter-form values across reloads via URL'
      - 'Hydrate a react-hook-form from URL params on first render'
    failure_modes:
      - mistake: 'Building defaultValues from urlState inline inside the component'
        mechanism: >
          Same root cause as the cross-skill issue: a fresh defaultValues object on each render breaks both
          useForm and useUrlState identity tracking. Share a module-scoped FORM_DEFAULTS const.
        wrong_pattern: |
          const defaults = { ...formValues };
          useUrlState(defaults);
          useForm({ defaultValues: defaults });
        correct_pattern: |
          const FORM_DEFAULTS = { name: '', email: '' };
          const { urlState, setUrl } = useUrlState(FORM_DEFAULTS, { searchParams });
          const form = useForm({ defaultValues: urlState });
        source: 'GitHub issue #57 (maintainer reply)'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using watch() instead of subscribe() to sync RHF → URL'
        mechanism: >
          react-hook-form watch() re-renders the host on every change; subscribe() is push-based and avoids
          re-renders. Owner explicitly recommends subscribe in issue #57.
        wrong_pattern: |
          const values = form.watch();
          useEffect(() => { setUrl(values); }, [values]);
        correct_pattern: |
          useEffect(() => {
            const sub = form.subscribe({
              formState: { values: true },
              callback: ({ values }) => setUrl(values),
            });
            return () => sub();
          }, [form, setUrl]);
        source: 'GitHub issue #57 (maintainer reply)'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Shared state without URL sync'
    slug: 'shared-state-no-url'
    domain: 'non-url-sharing'
    description: 'useSharedState as a framework-agnostic, cross-component state primitive when URL sync is explicitly NOT wanted. Same identity-based sharing model as useUrlState.'
    type: 'core'
    covers:
      - 'useSharedState(defaultState) → { state, getState, setState }'
      - 'Same module-scoped default-state object rule as useUrlState'
      - 'Optional _getInitial function for SSR'
    tasks:
      - 'Share state between unrelated components without context'
      - 'Use as a lightweight Context.Provider replacement'
    failure_modes:
      - mistake: 'Reaching for useSharedState when URL sync is wanted'
        mechanism: >
          useSharedState has no URL involvement. Agents may pick it because the API is simpler, missing the URL
          persistence/shareability benefit of useUrlState.
        wrong_pattern: |
          const { state, setState } = useSharedState(FILTERS); // refresh loses filter state
        correct_pattern: |
          const { urlState, setUrl } = useUrlState(FILTERS); // refresh preserves it
        source: 'Maintainer interview: "useSharedState only if user asks to opt out from URL sync"'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Default state defined inside the component'
        mechanism: >
          Same identity-based sharing rule as useUrlState. A non-static default breaks cross-component sharing.
        wrong_pattern: |
          function A() { const s = { x: 0 }; useSharedState(s); }
        correct_pattern: |
          const SHARED = { x: 0 };
          function A() { useSharedState(SHARED); }
        source: 'Inferred from useUrlState pattern (same internals)'
        priority: 'HIGH'
        status: 'active'

tensions:
  - name: 'Instant input feedback vs URL write throttling'
    skills: ['feature-state-hook', 'input-handling']
    description: >
      The library deliberately throttles URL writes to coalesce rapid updates and respect browser limits.
      State updates are synchronous; URL updates lag. An agent optimizing for "URL is always current" will
      bind setUrl directly to onChange and produce a janky UX (#78). An agent optimizing for "responsive
      input" must learn the setState+setUrl-on-blur split.
    implication: >
      Agents binding setUrl to onChange of typing inputs cause input lag and over-writes. Agents avoiding
      setUrl entirely lose URL persistence.

  - name: 'TypeScript autocomplete strength vs interface declaration habits'
    skills: ['feature-state-hook']
    description: >
      Agents trained on idiomatic TypeScript often default to interface for object shapes (interfaces support
      declaration merging, interfaces are more "OO-flavored"). state-in-url's JSONCompatible<T> constraint
      rejects interfaces. The error is non-obvious unless the agent knows the rule.
    implication: >
      Agents will produce code that fails type-check with a confusing JSONCompatible error. They will then
      try to fix the type instead of changing interface to type.

  - name: 'SSR correctness vs client-component simplicity'
    skills: ['feature-state-hook', 'nextjs-ssr']
    description: >
      The minimal client-only setup (useUrlState(STATE)) works on the client but causes hydration mismatches
      in Next.js App Router because the first render has no URL knowledge. The fix (forwarding searchParams)
      adds boilerplate and requires touching the parent server page.
    implication: >
      Agents writing isolated client components forget to plumb searchParams down from the page, causing
      hydration warnings and missing first-paint state. Most-reported Next.js issue (#40, #60).

  - name: 'Pure client useState ergonomics vs URL state setup cost'
    skills: ['feature-state-hook', 'shared-state-no-url']
    description: >
      useState is the agent's default; useUrlState requires a module-scoped const and type definition. Agents
      may default to useState even when shareability/persistence is implied by the task ("filters", "tabs").
    implication: >
      Agents under-use the library for tasks where it is the right tool, defaulting to useState + context.

cross_references:
  - from: 'feature-state-hook'
    to: 'nextjs-ssr'
    reason: 'Any Next.js consumer of the feature-state-hook pattern needs SSR plumbing to avoid hydration mismatches.'
